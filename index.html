<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stereo L 88.5 FM</title>

<meta name="theme-color" content="#0a1f44">

<style>
body{
margin:0;
font-family:Arial;
background:#06142e;
color:white;
text-align:center;
}

/* HEADER */
header{
padding:20px;
background:linear-gradient(180deg,#0a1f44,#102a5c);
}

.logo{
width:180px;
border-radius:15px;
}

h1{
color:#ffd700;
margin:10px 0 0;
}

h2{
font-size:14px;
opacity:.8;
margin:5px 0;
}

/* HERO IMAGE */
.hero{
width:100%;
height:200px;
object-fit:cover;
}

/* PLAYER */
.player{
width:92%;
max-width:420px;
margin:-35px auto 15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:25px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

/* STATUS */
.status{
color:#00ff99;
font-weight:bold;
margin-bottom:10px;
}

/* SONG */
.song{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

.artist{
font-size:13px;
opacity:.8;
margin-bottom:10px;
}

/* PLAY ROW */
.play-row{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-top:10px;
}

/* PLAY BUTTON */
.play-btn{
width:75px;
height:75px;
border-radius:50%;
border:none;
background:#ffd700;
font-size:28px;
font-weight:bold;
cursor:pointer;
}

/* TEXT */
.play-text{
text-align:left;
font-size:13px;
opacity:.9;
line-height:1.3;
}

/* AUDIO */
audio{
display:none;
}

/* HISTORY */
.history{
width:92%;
max-width:420px;
margin:10px auto;
text-align:left;
}

.history h3{
font-size:14px;
color:#ffd700;
margin-bottom:8px;
}

.item{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
margin-bottom:6px;
font-size:13px;
}

/* BUTTONS */
.buttons{
width:92%;
max-width:420px;
margin:15px auto;
display:grid;
gap:10px;
}

.buttons a{
background:#ffd700;
color:#000;
padding:12px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */
footer{
margin-top:20px;
padding:15px;
background:#ffd700;
color:#000;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<img class="logo" src="http://imgfz.com/i/IDt2Mup.png">
<h1>Radio Stereo L</h1>
<h2>88.5 FM - Tumbes</h2>
</header>

<!-- IMAGEN CIUDAD -->
<img class="hero" src="https://imgfz.com/i/NGiaBK3.png">

<!-- PLAYER -->
<div class="player">

<div class="status">🔴 EN VIVO</div>

<div class="song" id="song">Cargando canción...</div>
<div class="artist" id="artist">Stereo L 88.5 FM</div>

<div class="play-row">
<button class="play-btn" onclick="toggleRadio()">▶</button>

<div class="play-text">
<b>Listo para escuchar</b><br>
Toca play para sintonizar la radio
</div>
</div>

<audio id="radio">
<source src="https://radiostreaming.pro/8234/stream" type="audio/mpeg">
</audio>

</div>

<!-- HISTORIAL -->
<div class="history">
<h3>SONÓ EN STEREO L</h3>
<div id="history"></div>
</div>

<!-- BOTONES -->
<div class="buttons">
<a href="https://wa.me/51974421529">📱 WhatsApp</a>
<a href="#">🎵 Pedir canción</a>
<a href="#">📢 Publicidad</a>
</div>

<footer>
Diseño y desarrollo web por Marcony Clavijo | 942883375. 
</footer>

<script>

let radio = document.getElementById("radio");
let isPlaying = false;

/* PLAY */
function toggleRadio(){

if(isPlaying){
radio.pause();
isPlaying = false;
document.querySelector(".play-btn").innerHTML = "▶";
}else{
radio.play();
isPlaying = true;
document.querySelector(".play-btn").innerHTML = "⏸";
}

}

/* HISTORIAL (10 CANCIONES) */
let historyList = JSON.parse(localStorage.getItem("stereo_l_history")) || [];

renderHistory();

function addHistory(song){

if(!song) return;

/* evitar repetido inmediato */
if(historyList[0] === song) return;

/* agregar */
historyList.unshift(song);

/* 🔥 máximo 10 */
if(historyList.length > 10){
historyList = historyList.slice(0, 10);
}

/* guardar */
localStorage.setItem("stereo_l_history", JSON.stringify(historyList));

renderHistory();
}

function renderHistory(){

let html = "";

historyList.forEach(item=>{
html += `<div class="item">🎵 ${item}</div>`;
});

document.getElementById("history").innerHTML = html;
}

/* METADATA */
async function loadMetadata(){

try{

const res = await fetch("https://radiostreaming.pro/cp/get_info.php?p=8234");
const data = await res.json();

let song = data.song || data.title || "";

if(song.includes("-")){
let parts = song.split("-");
let artist = parts[0].trim();
let title = parts[1].trim();

document.getElementById("artist").innerText = artist;
document.getElementById("song").innerText = title;

addHistory(artist + " - " + title);

}else{

document.getElementById("song").innerText = song;
addHistory(song);

}

}catch(e){
console.log("error metadata");
}

}

loadMetadata();
setInterval(loadMetadata, 5000);

</script>

</body>
</html>
