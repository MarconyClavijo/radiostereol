<title>Stereo L 88.5 FM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a1f44;
color:white;
text-align:center;
}

header{
background:linear-gradient(#0a1f44,#1d4ed8);
padding:40px 20px;
}

..logo{
width:250px;
max-width:90%;
border-radius:20px;
animation:radio 4s infinite;
filter:drop-shadow(0 0 10px #ffd700);
}

@keyframes radio{

0%{
transform:scale(1) rotate(0deg);
filter:drop-shadow(0 0 5px yellow);
}

25%{
transform:scale(1.05) rotate(-2deg);
}

50%{
transform:scale(1.08);
filter:drop-shadow(0 0 25px gold);
}

75%{
transform:scale(1.05) rotate(2deg);
}

100%{
transform:scale(1);
filter:drop-shadow(0 0 5px yellow);
}

h1{
margin-top:20px;
font-size:45px;
color:#ffd700;
}

h2{
font-size:20px;
margin-top:10px;
}

.radio{
background:white;
color:#0a1f44;
width:90%;
max-width:500px;
margin:30px auto;
padding:25px;
border-radius:15px;
}

audio{
width:100%;
}

.botones{
width:90%;
max-width:600px;
margin:auto;
display:grid;
gap:10px;
padding:20px;
}

.botones a{
background:#ffd700;
color:#0a1f44;
padding:15px;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

footer{
margin-top:30px;
background:#ffd700;
color:#0a1f44;
padding:15px;
font-weight:bold;
}

</style>

</head>
