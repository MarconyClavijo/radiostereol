<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stereo L 88.5 FM</title>

<!-- PWA / Modo app -->
<meta name="theme-color" content="#0a1f44">
<link rel="manifest" href="manifest.json">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#06142e,#0a1f44);
color:white;
text-align:center;
}

/* HEADER */
header{
padding:30px 15px;
}

.logo{
width:180px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
font-size:40px;
color:#ffd700;
margin-top:10px;
}

h2{
font-size:16px;
opacity:.9;
}

/* PLAYER */
.player{
width:92%;
max-width:420px;
margin:20px auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.cover{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.status{
font-size:14px;
color:#ffd700;
margin-bottom:10px;
}

.song{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.artist{
font-size:14px;
opacity:.8;
}

/* BOTONES */
.buttons{
width:92%;
max-width:500px;
margin:20px auto;
display:grid;
gap:10px;
}

.buttons a{
background:#ffd700;
color:#0a1f44;
padding:14px;
text-decoration:none;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.buttons a:hover{
transform:scale(1.03);
}

/* FOOTER */
footer{
margin-top:20px;
padding:15px;
background:#ffd700;
color:#0a1f44;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<img class="logo" src="https://cdn.phototourl.com/free/2026-06-18-313aac64-7113-49e3-bfab-160be1a70e1c.png">
<h1>Stereo L</h1>
<h2>88.5 FM - Tumbes</h2>
<h2>Una Señal de Líderes</h2>
</header>

<!-- PLAYER PRO -->
<div class="player">

<img class="cover" src="https://kommodo.ai/i/850zzKtEqvTrYyv211FW" alt="Tumbes">

<div class="status">🔴 EN VIVO</div>

<div class="song" id="title">Cargando canción...</div>
<div class="artist" id="artist">Stereo L 88.5 FM</div>

<audio id="radio" autoplay controls>
<source src="https://radiostreaming.pro/8234/stream" type="audio/mpeg">
</audio>

</div>

<!-- BOTONES -->
<div class="buttons">

<a href="https://wa.me/51974421529">📱 WhatsApp</a>
<a href="#">🎵 Pide tu canción</a>
<a href="#">📢 Publicidad</a>
<a href="#">📻 Programación</a>

</div>

<footer>
Stereo L 88.5 FM - 2026
</footer>

<script>
// MEDIA SESSION (clave para que no se corte fácil en móvil)
if ('mediaSession' in navigator) {
navigator.mediaSession.metadata = new MediaMetadata({
title: 'Stereo L 88.5 FM',
artist: 'En Vivo desde Tumbes',
artwork: [
{ src: 'https://kommodo.ai/i/850zzKtEqvTrYyv211FW', sizes: '512x512', type: 'image/png' }
]
});
}

// INTENTO DE METADATA (puedes conectar RadioBOSS luego)
async function updateSong() {
try {
// Aquí luego puedes conectar RadioBOSS / AzuraCast / Icecast JSON
// Ejemplo simulado:
let data = {
title: "En vivo - Stereo L",
artist: "Tumbes Perú"
};

document.getElementById("title").innerText = data.title;
document.getElementById("artist").innerText = data.artist;

} catch (e) {
console.log("No metadata");
}
}

updateSong();
setInterval(updateSong, 15000);
</script>

</body>
</html>
